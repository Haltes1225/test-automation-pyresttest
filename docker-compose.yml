services:
  proxy:
    image: tivix/docker-nginx:v16
    environment:
      - UPSTREAMS=/:backend:8000
    ports:
      - 8080:80
    depends_on:
      backend:
        condition: service_started
    networks:
      - default

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    command: ["dev"]
    networks:
      - default

networks:
  default:
    driver: bridge
